name: Publish Windows release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-windows-release:
    name: Build and publish Windows package
    runs-on: windows-latest

    steps:
      - name: Check out the tagged version
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require the tag to point to main history
        shell: bash
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "Release tags must point to a commit already merged into main."
            exit 1
          }

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package the complete Windows app
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $releaseDirectory = "build/windows/x64/runner/Release"
          $archive = "AgentBattery-$tag-windows-x64.zip"

          if (-not (Test-Path "$releaseDirectory/AgentBattery.exe")) {
            throw "Windows executable was not generated."
          }

          Compress-Archive -Path "$releaseDirectory/*" -DestinationPath $archive -Force
          "ARCHIVE=$archive" >> $env:GITHUB_ENV

      - name: Create or update the GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ARCHIVE" --clobber --repo "$GITHUB_REPOSITORY"
            gh release edit "$TAG" --prerelease=false --latest --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" "$ARCHIVE" \
              --title "AgentBattery $TAG" \
              --generate-notes \
              --latest \
              --repo "$GITHUB_REPOSITORY"
          fi
